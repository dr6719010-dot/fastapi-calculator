<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CalcX</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --border: #e8e6e0;
      --text: #1a1a1a;
      --text-muted: #888;
      --accent: #1a1a1a;
      --accent-hover: #333;
      --success: #2d6a4f;
      --error: #c1121f;
      --tag-bg: #f0ede6;
      --radius: 16px;
      --shadow: 0 2px 24px rgba(0,0,0,0.07);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      color: var(--text);
    }

    .wrapper { width: 100%; max-width: 480px; }

    header { margin-bottom: 2.5rem; }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }

    .logo-dot {
      width: 10px;
      height: 10px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }

    h1 { font-size: 1.4rem; font-weight: 600; letter-spacing: -0.04em; }
    h1 span { font-weight: 300; opacity: 0.4; }

    .subtitle {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
      margin-left: 20px;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 2rem;
      box-shadow: var(--shadow);
    }

    .field { margin-bottom: 1.5rem; }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.6rem;
    }

    .ops { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .op-btn {
      padding: 0.65rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      cursor: pointer;
      color: var(--text-muted);
      transition: all 0.15s ease;
      text-align: left;
    }

    .op-btn:hover { border-color: var(--accent); color: var(--accent); }
    .op-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

    input[type="text"], input[type="number"] {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      color: var(--text);
      background: var(--surface);
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus, input[type="number"]:focus { border-color: var(--accent); }
    input::placeholder { color: #ccc; }

    .hint { font-size: 0.72rem; color: var(--text-muted); margin-top: 0.4rem; font-family: 'DM Mono', monospace; }

    .base-field { margin-bottom: 1.5rem; display: none; animation: slideIn 0.2s ease; }
    .base-field.visible { display: block; }

    .submit-btn {
      width: 100%;
      padding: 0.85rem;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      margin-top: 0.5rem;
    }

    .submit-btn:hover { background: var(--accent-hover); }
    .submit-btn:active { transform: scale(0.98); }
    .submit-btn:disabled { background: #ccc; cursor: not-allowed; }

    .result-box {
      margin-top: 1.5rem;
      padding: 1.25rem 1.5rem;
      border-radius: 10px;
      display: none;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result-box.success { background: #f0faf5; border: 1.5px solid #b7e4c7; display: block; }
    .result-box.error { background: #fff5f5; border: 1.5px solid #f5c2c2; display: block; }

    .result-label { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; }
    .result-box.success .result-label { color: var(--success); }
    .result-box.error .result-label { color: var(--error); }

    .result-value { font-family: 'DM Mono', monospace; font-size: 1.6rem; font-weight: 500; color: var(--text); word-break: break-all; }
    .result-box.error .result-value { font-size: 0.9rem; color: var(--error); }

    .result-op { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; font-family: 'DM Mono', monospace; }

    .divider { height: 1px; background: var(--border); margin: 1.5rem 0; }

    .history-section h2 { font-size: 0.75rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.75rem; }

    .history-list { display: flex; flex-direction: column; gap: 6px; }

    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.6rem 0.9rem;
      background: var(--tag-bg);
      border-radius: 8px;
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      animation: slideIn 0.2s ease;
    }

    .history-op { color: var(--text-muted); text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.05em; }
    .history-result { font-weight: 500; color: var(--text); max-width: 60%; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    footer { margin-top: 1.5rem; text-align: center; font-size: 0.72rem; color: var(--text-muted); font-family: 'DM Mono', monospace; }
    footer a { color: var(--text); text-decoration: none; font-weight: 500; }
  </style>
</head>
<body>
  <div class="wrapper">
    <header>
      <div class="logo">
        <div class="logo-dot"></div>
        <h1>Calc<span>X</span></h1>
      </div>
      <p class="subtitle">calcx-api → connected</p>
    </header>

    <div class="card">
      <div class="field">
        <label>Operation</label>
        <div class="ops">
          <button class="op-btn active" data-op="sum">+ sum</button>
          <button class="op-btn" data-op="product">× product</button>
          <button class="op-btn" data-op="difference">− difference</button>
          <button class="op-btn" data-op="division">÷ division</button>
          <button class="op-btn" data-op="log" style="grid-column: span 2;">㏒ logarithm</button>
        </div>
      </div>

      <div class="field">
        <label>Numbers</label>
        <input type="text" id="numbers-input" placeholder="10, 100, 1000" />
        <p class="hint">separate numbers with commas</p>
      </div>

      <div class="base-field" id="base-field">
        <label>Base <span style="font-weight:300;text-transform:none;letter-spacing:0;">(optional — leave empty for natural log)</span></label>
        <input type="number" id="base-input" placeholder="e.g. 10" min="0" step="any"/>
      </div>

      <button class="submit-btn" id="calculate-btn">Calculate</button>

      <div class="result-box" id="result-box">
        <div class="result-label" id="result-label">Result</div>
        <div class="result-value" id="result-value"></div>
        <div class="result-op" id="result-op"></div>
      </div>

      <div class="divider"></div>

      <div class="history-section">
        <h2>Recent</h2>
        <div class="history-list" id="history-list">
          <div class="history-item" style="color:#ccc;font-size:0.75rem;justify-content:center;">
            no calculations yet
          </div>
        </div>
      </div>
    </div>

    <footer>
      CalcX · built with FastAPI + vanilla JS &nbsp;·&nbsp;
      <a href="https://fastapi-calculator-production-cef1.up.railway.app/docs" target="_blank">api docs →</a>
    </footer>
  </div>

  <script>
    const API = window.location.origin;
    let selectedOp = 'sum';
    const history = [];

    document.querySelectorAll('.op-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.op-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedOp = btn.dataset.op;
        const baseField = document.getElementById('base-field');
        if (selectedOp === 'log') {
          baseField.classList.add('visible');
        } else {
          baseField.classList.remove('visible');
          document.getElementById('base-input').value = '';
        }
      });
    });

    document.getElementById('calculate-btn').addEventListener('click', async () => {
      const input = document.getElementById('numbers-input').value;
      const numbers = input.split(',').map(n => Number(n.trim())).filter(n => !isNaN(n) && n !== '');
      const baseInput = document.getElementById('base-input').value;
      const base = baseInput !== '' ? parseFloat(baseInput) : null;
      const btn = document.getElementById('calculate-btn');

      if (numbers.length === 0) { showError('please enter at least one number'); return; }

      btn.disabled = true;
      btn.textContent = 'Calculating...';

      try {
        const body = { operation: selectedOp, numbers };
        if (selectedOp === 'log') body.base = base;

        const res = await fetch(`${API}/calculate`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        const data = await res.json();
        if (!res.ok) { showError(data.detail || 'something went wrong'); return; }
        showSuccess(data.result, data.operation, numbers, base);
        addToHistory(data.operation, data.result);
      } catch (err) {
        showError('cannot connect to API — is the server running?');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Calculate';
      }
    });

    function formatResult(result) {
      if (Array.isArray(result)) return result.map(n => parseFloat(n.toFixed(6))).join(', ');
      return typeof result === 'number' ? parseFloat(result.toFixed(6)) : result;
    }

    function showSuccess(result, op, numbers, base) {
      const box = document.getElementById('result-box');
      box.className = 'result-box success';
      document.getElementById('result-label').textContent = 'Result';
      document.getElementById('result-value').textContent = formatResult(result);
      const baseStr = op === 'log' ? (base ? ` (base ${base})` : ' (natural log)') : '';
      document.getElementById('result-op').textContent = `${op}${baseStr} of [${numbers.join(', ')}]`;
    }

    function showError(msg) {
      const box = document.getElementById('result-box');
      box.className = 'result-box error';
      document.getElementById('result-label').textContent = 'Error';
      document.getElementById('result-value').textContent = msg;
      document.getElementById('result-op').textContent = '';
    }

    function addToHistory(op, result) {
      history.unshift({ op, result });
      if (history.length > 5) history.pop();
      renderHistory();
    }

    function renderHistory() {
      const list = document.getElementById('history-list');
      if (history.length === 0) {
        list.innerHTML = '<div class="history-item" style="color:#ccc;font-size:0.75rem;justify-content:center;">no calculations yet</div>';
        return;
      }
      list.innerHTML = history.map(h => `
        <div class="history-item">
          <span class="history-op">${h.op}</span>
          <span class="history-result">${formatResult(h.result)}</span>
        </div>
      `).join('');
    }

    document.getElementById('numbers-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('calculate-btn').click();
    });
  </script>
</body>
</html>
